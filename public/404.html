<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SEOHARO</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages redirection trick
      var l = window.location;
      // Redirect to the root index.html with the target path in the 'p' query parameter
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname) +
        l.search + l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
